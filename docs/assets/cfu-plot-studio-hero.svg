<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">CFU Plot Studio hero graphic</title>
  <desc id="desc">A lab-themed graphic showing a petri dish, bar plot, and reproducible export cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4fbf9"/>
      <stop offset="100%" stop-color="#eaf1f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#244046" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="1030" cy="90" r="160" fill="#6aa6a1" opacity="0.10"/>
  <circle cx="130" cy="430" r="190" fill="#4c78a8" opacity="0.08"/>

  <g transform="translate(80 82)">
    <text x="0" y="0" fill="#58737b" font-family="Arial, sans-serif" font-size="23" font-weight="700" letter-spacing="4">LAB FIGURE UTILITY</text>
    <text x="0" y="58" fill="#132f36" font-family="Arial, sans-serif" font-size="58" font-weight="800">CFU Plot Studio</text>
    <text x="0" y="105" fill="#415d61" font-family="Arial, sans-serif" font-size="27">Publication-ready CFU plots, statistics, and reproducible exports.</text>

    <g transform="translate(0 150)">
      <rect x="0" y="0" width="178" height="44" rx="22" fill="#ffffff" filter="url(#shadow)"/>
      <circle cx="25" cy="22" r="8" fill="#6aa6a1"/>
      <text x="43" y="29" fill="#31535a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Replicates</text>

      <rect x="200" y="0" width="152" height="44" rx="22" fill="#ffffff" filter="url(#shadow)"/>
      <circle cx="225" cy="22" r="8" fill="#d66b63"/>
      <text x="243" y="29" fill="#31535a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Stats</text>

      <rect x="374" y="0" width="170" height="44" rx="22" fill="#ffffff" filter="url(#shadow)"/>
      <circle cx="399" cy="22" r="8" fill="#4c78a8"/>
      <text x="417" y="29" fill="#31535a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Editable</text>
    </g>
  </g>

  <g transform="translate(720 110)" filter="url(#shadow)">
    <circle cx="130" cy="130" r="126" fill="#ffffff"/>
    <circle cx="130" cy="130" r="106" fill="#eef8f5" stroke="#cadfda" stroke-width="4"/>
    <circle cx="130" cy="130" r="76" fill="none" stroke="#b6d2cc" stroke-width="2" stroke-dasharray="5 7"/>
    <circle cx="86" cy="92" r="15" fill="#6aa6a1"/>
    <circle cx="140" cy="76" r="9" fill="#d66b63"/>
    <circle cx="174" cy="126" r="18" fill="#4c78a8"/>
    <circle cx="104" cy="160" r="12" fill="#e5a84b"/>
    <circle cx="145" cy="183" r="15" fill="#6aa6a1"/>
    <circle cx="112" cy="125" r="9" fill="#d66b63"/>
    <circle cx="152" cy="146" r="9" fill="#31535a"/>
  </g>

  <g transform="translate(870 288)" filter="url(#shadow)">
    <rect x="0" y="0" width="210" height="138" rx="16" fill="#ffffff"/>
    <line x1="34" y1="102" x2="178" y2="102" stroke="#263b40" stroke-width="3"/>
    <line x1="34" y1="28" x2="34" y2="102" stroke="#263b40" stroke-width="3"/>
    <rect x="58" y="62" width="22" height="40" rx="3" fill="#7aa6c2"/>
    <rect x="94" y="38" width="22" height="64" rx="3" fill="#4c78a8"/>
    <rect x="130" y="78" width="22" height="24" rx="3" fill="#d66b63"/>
    <line x1="69" y1="46" x2="69" y2="76" stroke="#263b40" stroke-width="3"/>
    <line x1="105" y1="24" x2="105" y2="52" stroke="#263b40" stroke-width="3"/>
    <line x1="141" y1="62" x2="141" y2="91" stroke="#263b40" stroke-width="3"/>
  </g>
</svg>
