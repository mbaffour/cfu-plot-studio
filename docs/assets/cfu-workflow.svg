<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="300" viewBox="0 0 1100 300" role="img" aria-labelledby="title desc">
  <title id="title">CFU Plot Studio workflow</title>
  <desc id="desc">Workflow from CSV import to QC, plot customization, statistics, and reproducible export.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#244046" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1100" height="300" rx="24" fill="#f6fbfa"/>

  <g font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#17383f">
    <g transform="translate(52 58)" filter="url(#shadow)">
      <rect width="170" height="150" rx="16" fill="#ffffff"/>
      <text x="28" y="44">CSV import</text>
      <rect x="42" y="68" width="86" height="54" rx="5" fill="#eef7f5" stroke="#6aa6a1" stroke-width="3"/>
      <line x1="55" y1="84" x2="115" y2="84" stroke="#6aa6a1" stroke-width="3"/>
      <line x1="55" y1="99" x2="115" y2="99" stroke="#6aa6a1" stroke-width="3"/>
      <line x1="55" y1="114" x2="94" y2="114" stroke="#6aa6a1" stroke-width="3"/>
    </g>

    <g transform="translate(288 58)" filter="url(#shadow)">
      <rect width="170" height="150" rx="16" fill="#ffffff"/>
      <text x="48" y="44">QC</text>
      <circle cx="84" cy="96" r="34" fill="#eff8f1" stroke="#6aa6a1" stroke-width="4"/>
      <path d="M66 96 L78 108 L104 80" fill="none" stroke="#2e6b35" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(524 58)" filter="url(#shadow)">
      <rect width="170" height="150" rx="16" fill="#ffffff"/>
      <text x="46" y="44">Plot</text>
      <line x1="42" y1="116" x2="132" y2="116" stroke="#263b40" stroke-width="3"/>
      <rect x="54" y="80" width="18" height="36" rx="3" fill="#7aa6c2"/>
      <rect x="82" y="58" width="18" height="58" rx="3" fill="#4c78a8"/>
      <rect x="110" y="92" width="18" height="24" rx="3" fill="#d66b63"/>
    </g>

    <g transform="translate(760 58)" filter="url(#shadow)">
      <rect width="170" height="150" rx="16" fill="#ffffff"/>
      <text x="48" y="44">Stats</text>
      <text x="52" y="95" fill="#4c78a8" font-size="38">*</text>
      <text x="84" y="95" fill="#4c78a8" font-size="38">*</text>
      <text x="116" y="95" fill="#4c78a8" font-size="38">*</text>
      <line x1="42" y1="116" x2="130" y2="116" stroke="#d66b63" stroke-width="5" stroke-linecap="round"/>
    </g>

    <g transform="translate(936 58)" filter="url(#shadow)">
      <rect width="112" height="150" rx="16" fill="#ffffff"/>
      <text x="25" y="44">Export</text>
      <rect x="36" y="68" width="42" height="50" rx="5" fill="#eef7f5" stroke="#31535a" stroke-width="3"/>
      <path d="M57 76 L57 102 M45 91 L57 103 L69 91" stroke="#31535a" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g stroke="#6f8589" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M238 133 H270"/>
    <path d="M474 133 H506"/>
    <path d="M710 133 H742"/>
    <path d="M946 133 H922"/>
  </g>
</svg>
